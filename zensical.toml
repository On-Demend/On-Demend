[project]
site_name = "On-Demend"
site_url = "https://on-demend.github.io/On-Demend"
site_description = "On-Demand - Cloud Resources"
site_author = "On-Demend"
copyright = "Copyright &copy; 2026 On-Demend"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]
repo_url = "https://github.com/On-Demend/On-Demend"
repo_name = "On-Demend/On-Demend"
nav = [
    {"Home" = "index.md"},
    {"CI/CD" = [
        {"CodeSeries" = [
            { "CodeBuild" = [
                { "ECS" = "cicd/codeseries/codebuild/ecs.md" }
            ]},
            { "CodeDeploy" = [
                { "ECS" = "cicd/codeseries/codedeploy/ecs.md" }
            ]}
        ]}
    ]},
    { "DATABASE" = [
        { "Serverless" = "database/lambda.md" },
    ]},
    {"EC2" = [
        {"systemd" = "ec2/systemd.md"}
    ]},
    {"ECS" = [
        {"Docker" = "ecs/docker.md"},
        {"Gateway" = "ecs/gateway.md"},
        {"Installation" = "ecs/installation.md"}
    ]},
    { "EKS" = [
        { "AWS Load Balancer Controller" = "eks/awslbctr.md" },
        { "Base Resources" = "eks/base_resource.md" },
        { "Installation" = "eks/install.md" },
        { "Modify Domain" = "eks/change_domain.md" }
    ]},
    { "Logging" = [
        { "Athena" = "logging/athena.md" },
        { "CloudWatch" = "logging/cloudwatch.md" },
        { "Fluentbit" = "logging/fluentbit.md" }
    ]},
    { "Tools" =[
        { "cURL" = "tools/curl.md" },
        { "SSH/SCP" = "tools/ssh_scp.md" },
        { "Terraform" = "tools/terraform.md" },
        { "GitHub CLI" = "tools/ghcli.md" }
    ]}
]

[project.theme]
language = "en"
font.code = "Work Sans"
logo = "logos/on-demend.png"
icon.logo = "logos/on-demend.png"
favicon = "logos/on-demend.png"
icon.previous = "fontawesome/solid/angle-left"
icon.next = "fontawesome/solid/angle-right"
icon.repo = "fontawesome/brands/github-alt"
icon.edit = "material/pencil"
icon.view = "material/eye"
features = [
    "search.highlight",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "navigation.path",
    "toc.follow",
    "navigation.top",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
    "content.action.edit",
    "content.action.view",
    "content.tabs.link",
    "navigation.footer",
    "navigation.tracking",
    "navigation.tabs"
]

[project.theme.icon.admonition]
note = "octicons/tag-16"
abstract = "octicons/checklist-16"
info = "octicons/info-16"
tip = "octicons/squirrel-16"
success = "octicons/check-16"
question = "octicons/question-16"
warning = "octicons/alert-16"
failure = "octicons/x-circle-16"
danger = "octicons/zap-16"
bug = "octicons/bug-16"
example = "octicons/beaker-16"
quote = "octicons/quote-16"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "deep purple"
accent = "purple"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
primary = "black"
accent = "purple"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/On-Demend"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://hub.docker.com/u/ondemend"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
